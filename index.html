<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妈妈生日快乐 - 生日祝福</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 首页面 -->
    <div id="home-page" class="page active">
        <div class="home-container">
            <!-- 星星背景 -->
            <div class="stars"></div>
            
            <!-- 烟火特效 -->
            <div class="left-fireworks"></div>
            <div class="right-fireworks"></div>
            
            <!-- 内容 -->
            <div class="home-content">
                <h1 class="title-main">妈妈生日快乐</h1>
                <p class="subtitle">祝您岁岁平安，岁岁欢乐</p>
                
                <!-- 浮动心形 -->
                <div class="floating-hearts">
                    <span class="heart">❤️</span>
                    <span class="heart">💕</span>
                    <span class="heart">💖</span>
                    <span class="heart">💗</span>
                    <span class="heart">💝</span>
                </div>
                
                <button class="start-button" onclick="goToGame()">点击开始</button>
            </div>
        </div>
    </div>

    <!-- 游戏页面 -->
    <div id="game-page" class="page">
        <div class="game-container">
            <!-- 星星背景 -->
            <div class="stars"></div>
            
            <!-- 烟火特效 -->
            <div class="left-fireworks"></div>
            <div class="right-fireworks"></div>
            
            <!-- 游戏内容 -->
            <div class="game-content">
                <h2 class="game-title">盲盒抽奖</h2>
                <p class="game-subtitle">点击格子开始抽奖吧~</p>
                
                <div class="grid-container">
                    <div class="grid-item" onclick="drawPrize(0)"></div>
                    <div class="grid-item" onclick="drawPrize(1)"></div>
                    <div class="grid-item" onclick="drawPrize(2)"></div>
                    
                    <div class="grid-item" onclick="drawPrize(3)"></div>
                    <div class="grid-item special" onclick="drawPrize(4)"><span>超级大奖</span></div>
                    <div class="grid-item" onclick="drawPrize(5)"></div>
                    
                    <div class="grid-item" onclick="drawPrize(6)"></div>
                    <div class="grid-item" onclick="drawPrize(7)"></div>
                    <div class="grid-item" onclick="drawPrize(8)"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 祝福页面 -->
    <div id="blessing-page" class="page">
        <div class="blessing-container">
            <!-- 星星背景 -->
            <div class="stars"></div>
            
            <!-- 烟火特效 -->
            <div class="left-fireworks"></div>
            <div class="right-fireworks"></div>
            
            <!-- 祝福内容 -->
            <div class="blessing-content">
                <h2 class="blessing-title">生日祝福</h2>
                <div id="messages-container" class="messages-container"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
